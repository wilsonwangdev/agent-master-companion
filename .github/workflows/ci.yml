name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'AgentMasterCompanion/**'
      - 'AgentMasterCompanion.xcodeproj/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'AgentMasterCompanion/**'
      - 'AgentMasterCompanion.xcodeproj/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive:
    name: Release Archive
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure a tag exists for version injection
        run: |
          if ! git describe --tags --abbrev=0 >/dev/null 2>&1; then
            git tag v0.0.0-ci
          fi

      - name: Archive (Release, universal)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project AgentMasterCompanion.xcodeproj \
            -scheme AgentMasterCompanion \
            -configuration Release \
            -archivePath build/AgentMasterCompanion.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build/ci-archive.log | \
              grep -E "^(=== |\\*\\* |[^ ].*error:|[^ ].*warning:)" || true
          exit ${PIPESTATUS[0]}

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-archive-log
          path: build/ci-archive.log
          retention-days: 7
