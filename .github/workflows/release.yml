name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build DMG
        run: ./scripts/build_dmg.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/*.sha256
          generate_release_notes: true
